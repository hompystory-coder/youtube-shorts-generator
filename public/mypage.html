<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마이페이지 - YouTube Shorts Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-purple-50 to-pink-50 min-h-screen">
    <!-- 헤더 -->
    <header class="bg-white shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <i class="fas fa-video text-3xl text-blue-600"></i>
                    <h1 class="text-2xl font-bold text-gray-800">YouTube Shorts Generator</h1>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-2">
                        <i class="fas fa-user-circle text-3xl text-purple-500"></i>
                        <div>
                            <p class="font-semibold text-gray-800" id="userName">로딩중...</p>
                            <p class="text-xs text-gray-500" id="userEmail"></p>
                        </div>
                    </div>
                    <a href="/" class="px-4 py-2 text-gray-700 hover:text-blue-600 transition">
                        <i class="fas fa-home mr-1"></i>홈
                    </a>
                    <button onclick="logout()" class="px-4 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition">
                        <i class="fas fa-sign-out-alt mr-1"></i>로그아웃
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- 메인 컨텐츠 -->
    <main class="max-w-4xl mx-auto px-4 py-8">
        <!-- API 키 설정 -->
        <div class="bg-white rounded-xl shadow-lg p-8">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">
                <i class="fas fa-key mr-2 text-purple-600"></i>
                API 키 설정
            </h2>

            <form id="apiKeysForm" class="space-y-6">
                <!-- Gemini API Key -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-robot mr-1 text-blue-500"></i>
                        Gemini API Key (스크립트 생성용)
                    </label>
                    <input type="text" id="geminiApiKey" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        placeholder="AIzaSy..." />
                    <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-xs text-blue-600 hover:underline mt-1 inline-block">
                        <i class="fas fa-external-link-alt mr-1"></i>Google AI Studio에서 발급받기
                    </a>
                </div>

                <!-- Minimax API Key -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-microphone mr-1 text-green-500"></i>
                        Minimax API Key (음성 생성용)
                    </label>
                    <input type="password" id="minimaxApiKey" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        placeholder="eyJhbGciOi..." />
                    <a href="https://platform.minimaxi.com" target="_blank" class="text-xs text-blue-600 hover:underline mt-1 inline-block">
                        <i class="fas fa-external-link-alt mr-1"></i>Minimax 플랫폼에서 발급받기
                    </a>
                </div>

                <!-- Minimax Group ID -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-users mr-1 text-purple-500"></i>
                        Minimax Group ID
                    </label>
                    <input type="text" id="minimaxGroupId" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        placeholder="1977057..." />
                </div>

                <!-- Shotstack API Key -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-video mr-1 text-red-500"></i>
                        Shotstack API Key (비디오 편집용)
                    </label>
                    <input type="password" id="shotstackApiKey" 
                        class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                        placeholder="AIzaSy..." />
                    <a href="https://dashboard.shotstack.io/register" target="_blank" class="text-xs text-blue-600 hover:underline mt-1 inline-block">
                        <i class="fas fa-external-link-alt mr-1"></i>Shotstack 대시보드에서 발급받기
                    </a>
                </div>

                <!-- Submit Button -->
                <button type="submit" 
                    class="w-full px-6 py-4 bg-gradient-to-r from-purple-600 to-pink-600 text-white rounded-lg hover:from-purple-700 hover:to-pink-700 transition font-bold text-lg shadow-xl">
                    <i class="fas fa-save mr-2"></i>
                    API 키 저장
                </button>
            </form>

            <!-- Success Message -->
            <div id="successMessage" class="hidden mt-4 p-4 bg-green-100 text-green-700 rounded-lg">
                <i class="fas fa-check-circle mr-2"></i>
                API 키가 성공적으로 저장되었습니다!
            </div>

            <!-- Error Message -->
            <div id="errorMessage" class="hidden mt-4 p-4 bg-red-100 text-red-700 rounded-lg">
                <i class="fas fa-exclamation-circle mr-2"></i>
                <span id="errorText">저장 중 오류가 발생했습니다.</span>
            </div>
        </div>

        <!-- 기본 설정 섹션 -->
        <div class="bg-white rounded-xl shadow-lg p-8 mt-6">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">
                <i class="fas fa-cog mr-2 text-gray-600"></i>
                기본 설정
            </h2>

            <div class="space-y-4">
                <!-- Background Images -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-image mr-1 text-blue-500"></i>
                        배경 이미지 (총 <span id="bgImageCount">0</span>개)
                    </label>
                    <div id="bgImageList" class="text-sm text-gray-600">로딩 중...</div>
                </div>

                <!-- Background Music -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        <i class="fas fa-music mr-1 text-green-500"></i>
                        배경 음악 (총 <span id="bgMusicCount">0</span>개)
                    </label>
                    <div id="bgMusicList" class="text-sm text-gray-600">로딩 중...</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_BASE = '';

        // Check authentication
        async function checkAuth() {
            const userInfo = localStorage.getItem('user_info');
            if (!userInfo) {
                alert('로그인이 필요합니다.');
                window.location.href = '/login.html';
                return null;
            }

            const user = JSON.parse(userInfo);
            document.getElementById('userName').textContent = user.name || 'User';
            document.getElementById('userEmail').textContent = user.email || '';
            
            console.log('✅ User authenticated:', user.email);
            return user;
        }

        // Logout
        function logout() {
            localStorage.clear();
            window.location.href = '/';
        }

        // Load API keys
        async function loadApiKeys() {
            const userInfo = JSON.parse(localStorage.getItem('user_info') || '{}');
            const userId = userInfo.id || 'admin_001';
            const authToken = localStorage.getItem('jwt_token') || localStorage.getItem('auth_token');

            try {
                const response = await fetch(`${API_BASE}/api/settings/${userId}`, {
                    headers: { 'Authorization': `Bearer ${authToken}` }
                });

                if (response.ok) {
                    const data = await response.json();
                    if (data.success && data.data) {
                        // Populate form
                        document.getElementById('geminiApiKey').value = data.data.gemini_api_key || '';
                        document.getElementById('minimaxApiKey').value = data.data.minimax_api_key || '';
                        document.getElementById('minimaxGroupId').value = data.data.minimax_group_id || '';
                        document.getElementById('shotstackApiKey').value = data.data.shotstack_api_key || '';

                        // Display background images/music
                        const bgImages = data.data.background_images || [];
                        const bgMusic = data.data.background_music || [];

                        document.getElementById('bgImageCount').textContent = bgImages.length;
                        document.getElementById('bgMusicCount').textContent = bgMusic.length;

                        if (bgImages.length > 0) {
                            document.getElementById('bgImageList').innerHTML = bgImages.map(img => 
                                `<div class="text-xs text-gray-600">• ${img.name}</div>`
                            ).join('');
                        } else {
                            document.getElementById('bgImageList').textContent = '등록된 이미지가 없습니다.';
                        }

                        if (bgMusic.length > 0) {
                            document.getElementById('bgMusicList').innerHTML = bgMusic.map(music => 
                                `<div class="text-xs text-gray-600">• ${music.name}</div>`
                            ).join('');
                        } else {
                            document.getElementById('bgMusicList').textContent = '등록된 음악이 없습니다.';
                        }

                        console.log('✅ API keys loaded successfully');
                    }
                }
            } catch (error) {
                console.error('❌ Failed to load API keys:', error);
            }
        }

        // Save API keys
        document.getElementById('apiKeysForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const userInfo = JSON.parse(localStorage.getItem('user_info') || '{}');
            const userId = userInfo.id || 'admin_001';
            const authToken = localStorage.getItem('jwt_token') || localStorage.getItem('auth_token');

            const data = {
                gemini_api_key: document.getElementById('geminiApiKey').value,
                minimax_api_key: document.getElementById('minimaxApiKey').value,
                minimax_group_id: document.getElementById('minimaxGroupId').value,
                shotstack_api_key: document.getElementById('shotstackApiKey').value
            };

            try {
                const response = await fetch(`${API_BASE}/api/settings/${userId}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${authToken}`
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    document.getElementById('successMessage').classList.remove('hidden');
                    document.getElementById('errorMessage').classList.add('hidden');
                    console.log('✅ API keys saved successfully');

                    // Hide success message after 3 seconds
                    setTimeout(() => {
                        document.getElementById('successMessage').classList.add('hidden');
                    }, 3000);
                } else {
                    throw new Error(result.error || 'Failed to save');
                }
            } catch (error) {
                console.error('❌ Failed to save API keys:', error);
                document.getElementById('errorText').textContent = error.message || '저장 중 오류가 발생했습니다.';
                document.getElementById('errorMessage').classList.remove('hidden');
                document.getElementById('successMessage').classList.add('hidden');
            }
        });

        // Initialize
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('🚀 Initializing mypage...');
            await checkAuth();
            await loadApiKeys();
        });
    </script>
</body>
</html>
